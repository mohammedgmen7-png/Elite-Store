<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Store - متجر شحن الألعاب</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="navbar">
        <div class="container">
            <div class="logo">🎮 Elite Store</div>
            <div class="nav-links">
                <button id="loginBtn" class="btn-primary">دخول</button>
                <button id="registerBtn" class="btn-secondary">تسجيل</button>
                <button id="ordersBtn" class="btn-secondary" style="display:none;">طلباتي</button>
                <button id="logoutBtn" class="btn-danger" style="display:none;">خروج</button>
            </div>
        </div>
    </div>

    <!-- صفحة الرئيسية -->
    <div id="homePage" class="page">
        <div class="container">
            <h1>مرحباً بك في Elite Store</h1>
            <p>أسرع وأسهل طريقة لشحن ألعابك المفضلة</p>
            
            <div id="gamesList" class="games-grid">
                <!-- سيتم ملؤها بـ JavaScript -->
            </div>
        </div>
    </div>

    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="page" style="display:none;">
        <div class="container">
            <div class="form-container">
                <h2>دخول</h2>
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                    <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
                    <button type="submit" class="btn-primary">دخول</button>
                    <p>لا تملك حساب؟ <a href="#" onclick="showRegister()">اضغط هنا</a></p>
                </form>
            </div>
        </div>
    </div>
